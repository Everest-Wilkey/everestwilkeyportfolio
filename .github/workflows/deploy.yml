name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: web/everestportfolio/package-lock.json

      - name: Install dependencies
        working-directory: web/everestportfolio
        run: npm ci

      - name: Build
        working-directory: web/everestportfolio
        run: npm run build

      - name: Restart app
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: web/everestportfolio
        run: pm2 restart portfolio || pm2 start npm --name "portfolio" -- start
